name: Publish DevKit.Mcp to NuGet

on:
  push:
    branches: [master]
    paths:
      - 'MCP/DotNet/**'
      - '.github/workflows/publish-mcp.yml'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Extract version from csproj
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' MCP/DotNet/DevKit.Mcp/DevKit.Mcp.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if version already published
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.nuget.org/v3-flatcontainer/devkit.mcp/${{ steps.version.outputs.version }}/devkit.mcp.${{ steps.version.outputs.version }}.nupkg")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version ${{ steps.version.outputs.version }} already on NuGet — skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build
        if: steps.check.outputs.exists == 'false'
        run: dotnet build MCP/DotNet/DevKit.Mcp/DevKit.Mcp.csproj -c Release

      - name: Pack
        if: steps.check.outputs.exists == 'false'
        run: dotnet pack MCP/DotNet/DevKit.Mcp/DevKit.Mcp.csproj -c Release --no-build -o ./nupkg

      - name: Push to NuGet
        if: steps.check.outputs.exists == 'false'
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
